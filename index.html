<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MD메모장</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a4a7a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="MD메모장">
<link rel="apple-touch-icon" href="icon-512.png">
<link rel="icon" type="image/png" href="icon-192.png">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Geologica:wght@400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ─── THEME VARIABLES ─── */
  /* Light (default) */
  :root,
  [data-theme="light"] {
    --bg: #ffffff;
    --surface: #f5f5f5;
    --border: #e0e0e0;
    --accent: #1a73e8;
    --accent-dim: #d2e3fc;
    --text: #212121;
    --text-dim: #5f6368;
    --text-muted: #bdbdbd;
    --success: #137333;
    --btn-bg: #f5f5f5;
    --btn-fg: #212121;
    --btn-primary-bg: #1a73e8;
    --btn-primary-fg: #ffffff;
    --editor-bg: #ffffff;
    --header-bg: #f5f5f5;
    --pane-label-bg: #f0f0f0;
    --select-bg: #ffffff;
    --select-fg: #212121;
    --select-border: #e0e0e0;
    --font-ui: 'Noto Sans KR', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --radius: 6px;
    --scrollbar: #d0d0d0;
  }

  /* Dark */
  [data-theme="dark"] {
    --bg: #0f1117;
    --surface: #181c27;
    --border: #252b3b;
    --accent: #5b8cff;
    --accent-dim: #2a3a6e;
    --text: #e0e4f0;
    --text-dim: #6b748a;
    --text-muted: #3d4460;
    --success: #3ecf8e;
    --btn-bg: #252b3b;
    --btn-fg: #e0e4f0;
    --btn-primary-bg: #5b8cff;
    --btn-primary-fg: #ffffff;
    --editor-bg: #0f1117;
    --header-bg: #181c27;
    --pane-label-bg: #181c27;
    --select-bg: #181c27;
    --select-fg: #e0e4f0;
    --select-border: #252b3b;
    --font-ui: 'Noto Sans KR', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --radius: 6px;
    --scrollbar: #252b3b;
  }

  /* Claude */
  [data-theme="claude"] {
    --bg: #f5f4ed;
    --surface: #faf9f5;
    --border: #f0eee6;
    --accent: #c96442;
    --accent-dim: #f5ede8;
    --text: #141413;
    --text-dim: #5e5d59;
    --text-muted: #b0aea5;
    --success: #c96442;
    --btn-bg: #e8e6dc;
    --btn-fg: #4d4c48;
    --btn-primary-bg: #c96442;
    --btn-primary-fg: #faf9f5;
    --editor-bg: #faf9f5;
    --header-bg: #faf9f5;
    --pane-label-bg: #f5f4ed;
    --select-bg: #faf9f5;
    --select-fg: #141413;
    --select-border: #d1cfc5;
    --font-ui: Georgia, 'Noto Sans KR', serif;
    --font-mono: 'JetBrains Mono', monospace;
    --radius: 8px;
    --scrollbar: #d1cfc5;
  }

  /* Duolingo */
  [data-theme="duolingo"] {
    --bg: #ffffff;
    --surface: #f7f7f7;
    --border: #e5e5e5;
    --accent: #58cc02;
    --accent-dim: #d7ffb8;
    --text: #4b4b4b;
    --text-dim: #777777;
    --text-muted: #afafaf;
    --success: #58cc02;
    --btn-bg: #f7f7f7;
    --btn-fg: #4b4b4b;
    --btn-primary-bg: #58cc02;
    --btn-primary-fg: #ffffff;
    --editor-bg: #ffffff;
    --header-bg: #ffffff;
    --pane-label-bg: #f7f7f7;
    --select-bg: #ffffff;
    --select-fg: #4b4b4b;
    --select-border: #e5e5e5;
    --font-ui: 'Noto Sans KR', 'Nunito', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --radius: 12px;
    --scrollbar: #e5e5e5;
  }

  /* GitHub */
  [data-theme="github"] {
    --bg: #ffffff;
    --surface: #f6f8fa;
    --border: #d1d9e0;
    --accent: #0969da;
    --accent-dim: #ddf4ff;
    --text: #1f2328;
    --text-dim: #59636e;
    --text-muted: #818b98;
    --success: #1f883d;
    --btn-bg: #f6f8fa;
    --btn-fg: #1f2328;
    --btn-primary-bg: #1f883d;
    --btn-primary-fg: #ffffff;
    --editor-bg: #ffffff;
    --header-bg: #f6f8fa;
    --pane-label-bg: #f6f8fa;
    --select-bg: #ffffff;
    --select-fg: #1f2328;
    --select-border: #d1d9e0;
    --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    --font-mono: ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace;
    --radius: 6px;
    --scrollbar: #d1d9e0;
  }

  /* Kakao */
  [data-theme="kakao"] {
    --bg: #ffffff;
    --surface: #f8f8f8;
    --border: #e5e5e5;
    --accent: #fee500;
    --accent-dim: #fffbd0;
    --text: #222222;
    --text-dim: #666666;
    --text-muted: #bbbbbb;
    --success: #47b881;
    --btn-bg: #f0f0f0;
    --btn-fg: #222222;
    --btn-primary-bg: #fee500;
    --btn-primary-fg: #000000;
    --editor-bg: #ffffff;
    --header-bg: #ffffff;
    --pane-label-bg: #f8f8f8;
    --select-bg: #ffffff;
    --select-fg: #222222;
    --select-border: #e5e5e5;
    --font-ui: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, sans-serif;
    --font-mono: 'SF Mono', 'JetBrains Mono', monospace;
    --radius: 12px;
    --scrollbar: #e5e5e5;
  }

  /* Nintendo */
  [data-theme="nintendo"] {
    --bg: #ffffff;
    --surface: #f8f8f8;
    --border: #e0e0e0;
    --accent: #e60012;
    --accent-dim: #ffeaea;
    --text: #484848;
    --text-dim: #727272;
    --text-muted: #c8c8c8;
    --success: #468254;
    --btn-bg: #f8f8f8;
    --btn-fg: #484848;
    --btn-primary-bg: #e60012;
    --btn-primary-fg: #ffffff;
    --editor-bg: #ffffff;
    --header-bg: #ffffff;
    --pane-label-bg: #f8f8f8;
    --select-bg: #ffffff;
    --select-fg: #484848;
    --select-border: #e0e0e0;
    --font-ui: 'Geologica', 'Noto Sans KR', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --radius: 8px;
    --scrollbar: #e0e0e0;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font-ui); transition: background .2s, color .2s; }

  /* ── Header ── */
  #header {
    height: 48px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 10px;
  }
  /* ── App Icon ── */
  #app-icon {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    object-fit: cover;
    flex-shrink: 0;
    display: block;
  }
  #logo {
    display: inline-flex;
    font-family: var(--font-mono);
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: -0.5px;
    flex-shrink: 0;
  }
  #logo span { color: var(--text-dim); }
  #filename-display {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
    min-width: 0;
  }
  #filename-display.unsaved::after { content: ' •'; color: var(--accent); }
  .header-actions { display: flex; gap: 6px; margin-left: auto; align-items: center; flex-shrink: 0; }

  /* ── Theme Select ── */
  #theme-select {
    height: 28px;
    padding: 0 8px;
    border-radius: var(--radius);
    border: 1px solid var(--select-border);
    background: var(--select-bg);
    color: var(--select-fg);
    font-size: 12px;
    font-family: var(--font-ui);
    cursor: pointer;
    outline: none;
    transition: border-color .15s;
  }
  #theme-select:hover { border-color: var(--accent); }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--btn-bg);
    color: var(--btn-fg);
    font-size: 12px;
    font-family: var(--font-ui);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .btn:hover { filter: brightness(.95); }
  .btn.primary { background: var(--btn-primary-bg); border-color: var(--btn-primary-bg); color: var(--btn-primary-fg); }
  .btn.primary:hover { filter: brightness(1.1); }
  .btn svg { width: 12px; height: 12px; flex-shrink: 0; }

  /* Duolingo button 3D lip */
  [data-theme="duolingo"] .btn.primary { box-shadow: 0 3px 0 #58a700; }
  [data-theme="duolingo"] .btn.primary:active { transform: translateY(3px); box-shadow: none; }
  /* Nintendo button */
  [data-theme="nintendo"] .btn.primary { font-family: 'Geologica', sans-serif; font-weight: 600; }

  /* ── Toolbar ── */
  #toolbar {
    height: 36px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 2px;
    overflow-x: auto;
  }
  .tool-btn {
    width: 27px;
    height: 27px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    background: transparent;
    color: var(--text-dim);
    border-radius: calc(var(--radius) - 2px);
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    transition: all .12s;
    flex-shrink: 0;
  }
  .tool-btn:hover { background: var(--border); color: var(--text); }
  .tool-sep { width: 1px; height: 16px; background: var(--border); margin: 0 3px; flex-shrink: 0; }

  /* ── Main area ── */
  #main { display: flex; height: calc(100vh - 48px - 36px - 26px); }

  /* ── Editor pane ── */
  #editor-pane { flex: none; width: 50%; display: flex; flex-direction: column; min-width: 120px; }
  #preview-pane { flex: 1; display: flex; flex-direction: column; min-width: 120px; }

  /* ── Resizer ── */
  #resizer {
    width: 5px;
    flex-shrink: 0;
    background: var(--border);
    cursor: col-resize;
    position: relative;
    transition: background .15s;
    z-index: 10;
  }
  #resizer:hover, #resizer.dragging { background: var(--accent); }
  #resizer::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 1px;
    height: 32px;
    background: currentColor;
    opacity: .4;
    border-radius: 1px;
  }
  /* 드래그 중 텍스트 선택 방지 */
  body.resizing { user-select: none; cursor: col-resize; }
  body.resizing #editor, body.resizing #preview { pointer-events: none; }
  .pane-label {
    font-size: 10px;
    font-family: var(--font-mono);
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 5px 12px;
    background: var(--pane-label-bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  #editor {
    flex: 1;
    background: var(--editor-bg);
    color: var(--text);
    border: none;
    outline: none;
    resize: none;
    padding: 18px 20px;
    font-family: var(--font-mono);
    font-size: 13.5px;
    line-height: 1.75;
    tab-size: 2;
    caret-color: var(--accent);
    overflow-y: auto;
    transition: background .2s, color .2s;
  }
  #editor::placeholder { color: var(--text-muted); }
  #editor::-webkit-scrollbar { width: 5px; }
  #editor::-webkit-scrollbar-track { background: transparent; }
  #editor::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

  /* ── Preview pane ── */
  #preview-pane { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #preview {
    flex: 1;
    padding: 18px 24px;
    overflow-y: auto;
    line-height: 1.75;
    font-size: 14px;
    font-family: var(--font-ui);
  }
  #preview::-webkit-scrollbar { width: 5px; }
  #preview::-webkit-scrollbar-track { background: transparent; }
  #preview::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

  /* ── Markdown render styles ── */
  #preview h1 { font-size: 1.85em; font-weight: 700; margin: 0 0 .45em; color: var(--text); border-bottom: 2px solid var(--accent); padding-bottom: .25em; }
  #preview h2 { font-size: 1.4em; font-weight: 600; margin: 1.3em 0 .35em; color: var(--text); }
  #preview h3 { font-size: 1.1em; font-weight: 600; margin: 1.1em 0 .25em; color: var(--text); }
  #preview h4,#preview h5,#preview h6 { font-size: 1em; font-weight: 600; margin: .9em 0 .2em; }
  #preview p { margin: 0 0 .8em; }
  #preview a { color: var(--accent); text-decoration: none; }
  #preview a:hover { text-decoration: underline; }
  #preview ul,#preview ol { margin: 0 0 .8em 1.3em; }
  #preview li { margin-bottom: .2em; }
  #preview blockquote { border-left: 3px solid var(--accent); margin: .7em 0; padding: .35em .9em; background: var(--accent-dim); border-radius: 0 var(--radius) var(--radius) 0; color: var(--text-dim); }
  #preview code { font-family: var(--font-mono); font-size: .87em; background: var(--surface); border: 1px solid var(--border); padding: .1em .35em; border-radius: calc(var(--radius) - 2px); color: var(--accent); }
  #preview pre { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; overflow-x: auto; margin: .7em 0; }
  #preview pre code { background: none; border: none; padding: 0; font-size: .86em; color: var(--text); }
  #preview table { border-collapse: collapse; width: 100%; margin: .7em 0; }
  #preview th,#preview td { border: 1px solid var(--border); padding: 6px 10px; text-align: left; }
  #preview th { background: var(--surface); font-weight: 600; }
  #preview tr:hover td { background: var(--accent-dim); }
  #preview hr { border: none; border-top: 1px solid var(--border); margin: 1.2em 0; }
  #preview img { max-width: 100%; border-radius: var(--radius); }
  #preview strong { font-weight: 700; }
  #preview em { font-style: italic; color: var(--text-dim); }
  #preview del { color: var(--text-muted); text-decoration: line-through; }
  #preview input[type=checkbox] { margin-right: 4px; }

  /* Claude theme: serif headings */
  [data-theme="claude"] #preview h1,
  [data-theme="claude"] #preview h2,
  [data-theme="claude"] #preview h3 { font-family: Georgia, serif; font-weight: 500; }

  /* Duolingo theme: bold headings */
  [data-theme="duolingo"] #preview h1,
  [data-theme="duolingo"] #preview h2,
  [data-theme="duolingo"] #preview h3 { font-weight: 700; }

  /* ── Status bar ── */
  #statusbar {
    height: 26px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 14px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-muted);
  }
  #statusbar span { display: flex; align-items: center; gap: 3px; }
  #statusbar .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--success); }

  /* ── Toast ── */
  #toast {
    position: fixed;
    bottom: 38px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 16px;
    border-radius: var(--radius);
    font-size: 12px;
    font-family: var(--font-ui);
    pointer-events: none;
    opacity: 0;
    transition: all .2s;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }


  /* ═══════════════════════════════════════════════════════
     UI + 본문 크기 단계  (1~5)
     구 2단계 값 = 새 1단계 베이스
     기본값: 3단계
     헤더/툴바/버튼 + 에디터/미리보기 글자 함께 조절
  ═══════════════════════════════════════════════════════ */

  /* ─ 1단계 ─ */
  [data-scale="1"] #header           { height: 52px; }
  [data-scale="1"] #app-icon         { width: 26px; height: 26px; border-radius: 6px; }
  [data-scale="1"] #logo             { font-size: 16px; }
  [data-scale="1"] #filename-display { font-size: 13px; }
  [data-scale="1"] .btn              { font-size: 13px; padding: 5px 11px; }
  [data-scale="1"] .btn svg          { width: 13px; height: 13px; }
  [data-scale="1"] #theme-select     { font-size: 13px; height: 30px; }
  [data-scale="1"] #toolbar          { height: 40px; }
  [data-scale="1"] .tool-btn         { width: 30px; height: 30px; font-size: 12px; }
  [data-scale="1"] .scale-btn        { width: 24px; height: 24px; font-size: 14px; }
  [data-scale="1"] #scale-indicator  { font-size: 10px; }
  [data-scale="1"] #editor           { font-size: 14px; line-height: 1.75; }
  [data-scale="1"] #preview          { font-size: 14px; line-height: 1.75; }
  [data-scale="1"] #main             { height: calc(100vh - 52px - 40px - 26px); }

  /* ─ 2단계 ─ */
  [data-scale="2"] #header           { height: 56px; }
  [data-scale="2"] #app-icon         { width: 28px; height: 28px; border-radius: 7px; }
  [data-scale="2"] #logo             { font-size: 17px; }
  [data-scale="2"] #filename-display { font-size: 14px; }
  [data-scale="2"] .btn              { font-size: 14px; padding: 6px 13px; }
  [data-scale="2"] .btn svg          { width: 14px; height: 14px; }
  [data-scale="2"] #theme-select     { font-size: 14px; height: 32px; }
  [data-scale="2"] #toolbar          { height: 44px; }
  [data-scale="2"] .tool-btn         { width: 33px; height: 33px; font-size: 13px; }
  [data-scale="2"] .scale-btn        { width: 26px; height: 26px; font-size: 15px; }
  [data-scale="2"] #scale-indicator  { font-size: 11px; }
  [data-scale="2"] #editor           { font-size: 15.5px; line-height: 1.8; }
  [data-scale="2"] #preview          { font-size: 15.5px; line-height: 1.8; }
  [data-scale="2"] #main             { height: calc(100vh - 56px - 44px - 26px); }

  /* ─ 3단계 (기본값) ─ */
  [data-scale="3"] #header           { height: 60px; }
  [data-scale="3"] #app-icon         { width: 32px; height: 32px; border-radius: 8px; }
  [data-scale="3"] #logo             { font-size: 18px; }
  [data-scale="3"] #filename-display { font-size: 15px; }
  [data-scale="3"] .btn              { font-size: 15px; padding: 7px 15px; }
  [data-scale="3"] .btn svg          { width: 15px; height: 15px; }
  [data-scale="3"] #theme-select     { font-size: 15px; height: 34px; }
  [data-scale="3"] #toolbar          { height: 48px; }
  [data-scale="3"] .tool-btn         { width: 36px; height: 36px; font-size: 14px; }
  [data-scale="3"] .scale-btn        { width: 28px; height: 28px; font-size: 16px; }
  [data-scale="3"] #scale-indicator  { font-size: 12px; }
  [data-scale="3"] #editor           { font-size: 17px; line-height: 1.85; }
  [data-scale="3"] #preview          { font-size: 17px; line-height: 1.85; }
  [data-scale="3"] #main             { height: calc(100vh - 60px - 48px - 26px); }

  /* ─ 4단계 ─ */
  [data-scale="4"] #header           { height: 64px; }
  [data-scale="4"] #app-icon         { width: 36px; height: 36px; border-radius: 9px; }
  [data-scale="4"] #logo             { font-size: 20px; }
  [data-scale="4"] #filename-display { font-size: 16px; }
  [data-scale="4"] .btn              { font-size: 16px; padding: 8px 17px; }
  [data-scale="4"] .btn svg          { width: 16px; height: 16px; }
  [data-scale="4"] #theme-select     { font-size: 16px; height: 36px; }
  [data-scale="4"] #toolbar          { height: 52px; }
  [data-scale="4"] .tool-btn         { width: 39px; height: 39px; font-size: 15px; }
  [data-scale="4"] .scale-btn        { width: 30px; height: 30px; font-size: 17px; }
  [data-scale="4"] #scale-indicator  { font-size: 13px; }
  [data-scale="4"] #editor           { font-size: 19px; line-height: 1.9; }
  [data-scale="4"] #preview          { font-size: 19px; line-height: 1.9; }
  [data-scale="4"] #main             { height: calc(100vh - 64px - 52px - 26px); }

  /* ─ 5단계 ─ */
  [data-scale="5"] #header           { height: 68px; }
  [data-scale="5"] #app-icon         { width: 40px; height: 40px; border-radius: 10px; }
  [data-scale="5"] #logo             { font-size: 22px; }
  [data-scale="5"] #filename-display { font-size: 17px; }
  [data-scale="5"] .btn              { font-size: 17px; padding: 9px 19px; }
  [data-scale="5"] .btn svg          { width: 17px; height: 17px; }
  [data-scale="5"] #theme-select     { font-size: 17px; height: 38px; }
  [data-scale="5"] #toolbar          { height: 56px; }
  [data-scale="5"] .tool-btn         { width: 43px; height: 43px; font-size: 16px; }
  [data-scale="5"] .scale-btn        { width: 32px; height: 32px; font-size: 18px; }
  [data-scale="5"] #scale-indicator  { font-size: 14px; }
  [data-scale="5"] #editor           { font-size: 21px; line-height: 1.95; }
  [data-scale="5"] #preview          { font-size: 21px; line-height: 1.95; }
  [data-scale="5"] #main             { height: calc(100vh - 68px - 56px - 26px); }

  /* Scale buttons */
  .scale-btn {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    background: var(--btn-bg);
    color: var(--btn-fg);
    border-radius: calc(var(--radius) - 2px);
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    line-height: 1;
    transition: all .12s;
    flex-shrink: 0;
    user-select: none;
  }
  .scale-btn:hover { background: var(--border); color: var(--text); }
  .scale-btn:disabled { opacity: .35; cursor: default; }
  #scale-indicator {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
    min-width: 14px;
    text-align: center;
    flex-shrink: 0;
  }

  /* ═══════════════════════════════════════════════════════
     반응형 — 모바일 (768px 이하)
     편집/미리보기를 위아래로 쌓고, 토글 버튼으로 전환
  ═══════════════════════════════════════════════════════ */
  @media (max-width: 768px) {
    html, body { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    #header, [data-scale="1"] #header, [data-scale="2"] #header,
    [data-scale="3"] #header, [data-scale="4"] #header, [data-scale="5"] #header {
      padding: 8px 10px; gap: 6px 8px; flex-wrap: wrap; height: auto; flex-shrink: 0;
    }
    #logo { display: inline-flex; }
    #filename-display { font-size: 11px; order: 1; }
    .btn span { display: none; }           /* 텍스트 라벨 숨김, 아이콘만 */
    .btn { padding: 6px 8px; }
    #theme-select { font-size: 11px; flex: 1; min-width: 0; padding: 0 6px; }

    /* 1행: 아이콘 + 타이틀 + 파일명 */
    /* 2행: 열기 · 저장 · 새 문서 · 테마 선택 (전체 너비로 줄바꿈) */
    .header-actions { flex-basis: 100%; order: 2; margin-left: 0; flex-wrap: wrap; }

    /* 3행 / 4행: 서식 버튼 — row-break 지점에서 줄바꿈 */
    #toolbar, [data-scale="1"] #toolbar, [data-scale="2"] #toolbar,
    [data-scale="3"] #toolbar, [data-scale="4"] #toolbar, [data-scale="5"] #toolbar {
      padding: 6px 8px; overflow-x: visible; flex-wrap: wrap; height: auto; row-gap: 6px; flex-shrink: 0;
    }
    .row-break { flex-basis: 100%; height: 0; }

    /* #main은 헤더/툴바가 4행으로 늘어나 높이가 가변적이므로
       고정 calc() 대신 flex로 남은 공간을 채움 */
    #main, [data-scale="1"] #main, [data-scale="2"] #main,
    [data-scale="3"] #main, [data-scale="4"] #main, [data-scale="5"] #main {
      height: auto;
      flex: 1 1 auto;
      min-height: 0;
    }
    #statusbar { flex-shrink: 0; }

    /* 본문: flex-direction 변경으로 위/아래 배치 */
    #main { flex-direction: column; }

    #editor-pane, #preview-pane {
      width: 100% !important;
      flex: 1 !important;
      min-width: 0;
      min-height: 0;
    }

    /* 리사이저: 가로 막대로 변경 (위아래 패널 사이) */
    #resizer {
      width: 100%;
      height: 6px;
      cursor: row-resize;
    }
    #resizer::after {
      width: 32px;
      height: 1px;
    }

    /* ── 모바일 단일 패널 모드 ──
       body[data-mobile-view] 속성으로 한쪽만 표시 */
    #btn-mobile-toggle { display: inline-flex !important; }
    #mobile-toggle-sep { display: block !important; }

    body[data-mobile-view="editor"] #preview-pane { display: none; }
    body[data-mobile-view="editor"] #resizer { display: none; }
    body[data-mobile-view="editor"] #editor-pane { flex: 1 !important; }

    body[data-mobile-view="preview"] #editor-pane { display: none; }
    body[data-mobile-view="preview"] #resizer { display: none; }
    body[data-mobile-view="preview"] #preview-pane { flex: 1 !important; }

    /* 상태바: 일부 정보 축약 */
    #statusbar { font-size: 9.5px; gap: 8px; padding: 0 8px; }
    #stat-theme { display: none; }
  }

  /* 아주 좁은 화면 (480px 이하) — 추가 축약 */
  @media (max-width: 480px) {
    #app-icon { width: 22px !important; height: 22px !important; border-radius: 5px !important; }
    #logo { font-size: 14px; }
    .btn { padding: 5px 7px; }
    .btn svg { width: 14px; height: 14px; }
    #theme-select { font-size: 10px; }
    .tool-btn { width: 26px !important; height: 26px !important; }
  }
</style>
</head>
<body data-theme="light">

<div id="header">
  <img id="app-icon" src="icon-192.png" alt="MD메모장 아이콘">
  <span id="logo">MD<span>#</span></span>
  <div id="filename-display">새 문서.md</div>
  <div class="header-actions">
    <button class="btn" onclick="openFile()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4.5A1.5 1.5 0 0 1 3.5 3h3.086a1.5 1.5 0 0 1 1.06.44l1.415 1.415A1.5 1.5 0 0 0 10.12 5.5H12.5A1.5 1.5 0 0 1 14 7v5a1.5 1.5 0 0 1-1.5 1.5h-9A1.5 1.5 0 0 1 2 12V4.5Z"/></svg>
      열기
    </button>
    <button class="btn" onclick="saveFile()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13.5 10.5v2a1 1 0 0 1-1 1h-9a1 1 0 0 1-1-1v-2M8 2v7.5M5.5 7 8 9.5 10.5 7"/></svg>
      저장
    </button>
    <button class="btn primary" onclick="newDoc()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8h10M8 3v10"/></svg>
      새 문서
    </button>


    <!-- PWA Install button (hidden until installable) -->
    <button class="btn" id="btn-install" style="display:none" onclick="installPWA()" title="앱으로 설치">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2v8M5 7l3 3 3-3M2 12h12v2H2z"/></svg>
      설치
    </button>
    <!-- Theme selector -->
    <select id="theme-select" onchange="applyTheme(this.value)" title="테마 선택">
      <option value="light">라이트 모드</option>
      <option value="dark">다크 모드</option>
      <option value="claude">Claude</option>
      <option value="duolingo">Duolingo</option>
      <option value="github">GitHub</option>
      <option value="kakao">Kakao</option>
      <option value="nintendo">Nintendo</option>
    </select>
  </div>
</div>

<div id="toolbar">
  <!-- 굵게 -->
  <button class="tool-btn" title="굵게 (Ctrl+B)" onclick="wrap('**','**')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><path d="M6 12h8a4 4 0 0 0 0-8H6v8"/><path d="M6 12h9a4 4 0 0 1 0 8H6v-8"/></svg>
  </button>
  <!-- 기울임 -->
  <button class="tool-btn" title="기울임 (Ctrl+I)" onclick="wrap('*','*')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="width:15px;height:15px"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>
  </button>
  <!-- 취소선 -->
  <button class="tool-btn" title="취소선" onclick="wrap('~~','~~')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><path d="M16 4H9a3 3 0 0 0-2.83 4"/><path d="M14 12a4 4 0 0 1 0 8H6"/><line x1="4" y1="12" x2="20" y2="12"/></svg>
  </button>
  <!-- 인라인 코드 -->
  <button class="tool-btn" title="인라인 코드" onclick="wrap('`','`')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
  </button>
  <div class="tool-sep"></div>
  <!-- H1 -->
  <button class="tool-btn" title="제목 1" onclick="insertLine('# ')">H1</button>
  <!-- H2 -->
  <button class="tool-btn" title="제목 2" onclick="insertLine('## ')">H2</button>
  <!-- H3 -->
  <button class="tool-btn" title="제목 3" onclick="insertLine('### ')">H3</button>
  <div class="tool-sep"></div>
  <!-- 목록 -->
  <button class="tool-btn" title="목록" onclick="insertLine('- ')">
    <svg viewBox="0 0 24 24" fill="currentColor" style="width:15px;height:15px"><circle cx="4" cy="7" r="1.5"/><circle cx="4" cy="12" r="1.5"/><circle cx="4" cy="17" r="1.5"/><rect x="8" y="6" width="13" height="2" rx="1"/><rect x="8" y="11" width="13" height="2" rx="1"/><rect x="8" y="16" width="13" height="2" rx="1"/></svg>
  </button>
  <!-- 번호 목록 -->
  <button class="tool-btn" title="번호 목록" onclick="insertLine('1. ')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4"/><path d="M4 10h2"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"/></svg>
  </button>
  <!-- 체크박스 -->
  <button class="tool-btn" title="체크박스" onclick="insertLine('- [ ] ')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><rect x="3" y="5" width="14" height="14" rx="2"/><polyline points="7 12 10 15 16 9"/></svg>
  </button>
  <!-- 인용 -->
  <button class="tool-btn" title="인용" onclick="insertLine('> ')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" style="width:15px;height:15px"><line x1="3" y1="6" x2="3" y2="18" stroke-width="3.5"/><line x1="8" y1="9" x2="21" y2="9" stroke-width="2"/><line x1="8" y1="14" x2="19" y2="14" stroke-width="2"/></svg>
  </button>
  <span class="row-break"></span>
  <div class="tool-sep"></div>
  <!-- 코드 블록 -->
  <button class="tool-btn" title="코드 블록" onclick="insertBlock('```\n','\n```')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="2" y1="8" x2="22" y2="8"/><polyline points="7 13 5 17 7 21" stroke-width="1.8"/><polyline points="13 13 15 17 13 21" stroke-width="1.8"/></svg>
  </button>
  <!-- 수평선 -->
  <button class="tool-btn" title="수평선" onclick="insertLine('---')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" style="width:15px;height:15px"><line x1="2" y1="8" x2="22" y2="8" stroke-width="1.5"/><line x1="2" y1="12" x2="22" y2="12" stroke-width="3"/><line x1="2" y1="16" x2="22" y2="16" stroke-width="1.5"/></svg>
  </button>
  <button class="tool-btn" title="링크" onclick="insertLink()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
  </button>
  <div class="tool-sep"></div>
  <button class="tool-btn" title="표 삽입" onclick="insertTable()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="9" x2="9" y2="21"/><line x1="15" y1="9" x2="15" y2="21"/></svg>
  </button>
  <div class="tool-sep"></div>
  <button class="btn" id="btn-mobile-toggle" onclick="toggleMobileView()" title="편집/미리보기 전환" style="display:none">
    <svg viewBox="0 0 16 16" fill="currentColor" style="width:14px;height:14px">
      <polygon points="8,2 13,7 3,7"/>
      <polygon points="8,14 3,9 13,9"/>
    </svg>
    <span id="mobile-toggle-label">미리보기</span>
  </button>
  <div class="tool-sep" id="mobile-toggle-sep" style="display:none"></div>
  <button class="scale-btn" id="btn-scale-minus" onclick="changeScale(-1)" title="UI 크기 줄이기">−</button>
  <span id="scale-indicator">1</span>
  <button class="scale-btn" id="btn-scale-plus" onclick="changeScale(1)" title="UI 크기 키우기">+</button>
</div>

<div id="main">
  <div id="editor-pane">
    <div class="pane-label">편집</div>
    <textarea id="editor" placeholder="마크다운을 입력하세요...&#10;&#10;# 제목&#10;**굵게**, *기울임*, `코드`&#10;&#10;- 항목 1&#10;- 항목 2" spellcheck="false"></textarea>
  </div>
  <div id="resizer" title="드래그로 패널 크기 조절"></div>
  <div id="preview-pane">
    <div class="pane-label">미리보기</div>
    <div id="preview"></div>
  </div>
</div>

<div id="statusbar">
  <span><span class="dot"></span>준비</span>
  <span id="stat-chars">0자</span>
  <span id="stat-words">0단어</span>
  <span id="stat-lines">1줄</span>
  <span id="stat-theme" style="margin-left:auto; opacity:.6;">라이트 모드</span>
</div>

<div id="toast"></div>
<input type="file" id="file-input" accept=".md,.markdown,.txt">

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script>
  const editor = document.getElementById('editor');
  const preview = document.getElementById('preview');
  const filenameDisplay = document.getElementById('filename-display');
  const fileInput = document.getElementById('file-input');
  const themeSelect = document.getElementById('theme-select');
  const statTheme = document.getElementById('stat-theme');

  let currentFilename = '새 문서.md';
  let savedContent = '';
  let unsaved = false;

  const themeNames = {
    light: '라이트 모드', dark: '다크 모드',
    claude: 'Claude', duolingo: 'Duolingo',
    github: 'GitHub', kakao: 'Kakao', nintendo: 'Nintendo'
  };

  marked.setOptions({ breaks: true, gfm: true });

  function renderPreview() {
    preview.innerHTML = marked.parse(editor.value);
    preview.querySelectorAll('input[type=checkbox]').forEach(cb => cb.disabled = false);
  }

  function updateStats() {
    const text = editor.value;
    const chars = text.length;
    const words = text.trim() ? text.trim().split(/\s+/).length : 0;
    const lines = text.split('\n').length;
    document.getElementById('stat-chars').textContent = chars.toLocaleString() + '자';
    document.getElementById('stat-words').textContent = words.toLocaleString() + '단어';
    document.getElementById('stat-lines').textContent = lines.toLocaleString() + '줄';
  }

  function markUnsaved() {
    if (!unsaved) { unsaved = true; filenameDisplay.classList.add('unsaved'); }
  }

  function applyTheme(theme) {
    document.body.setAttribute('data-theme', theme);
    statTheme.textContent = themeNames[theme] || theme;
    localStorage.setItem('md-theme', theme);
    showToast('테마: ' + (themeNames[theme] || theme));
  }

  editor.addEventListener('input', () => { renderPreview(); updateStats(); markUnsaved(); });

  // Toolbar helpers
  function wrap(before, after) {
    const s = editor.selectionStart, e = editor.selectionEnd;
    editor.setRangeText(before + editor.value.substring(s, e) + after, s, e, 'select');
    editor.focus(); renderPreview(); markUnsaved();
  }
  function insertLine(prefix) {
    const s = editor.selectionStart;
    const ls = editor.value.lastIndexOf('\n', s - 1) + 1;
    editor.setRangeText(prefix, ls, ls, 'end');
    editor.focus(); renderPreview(); markUnsaved();
  }
  function insertBlock(before, after) {
    const s = editor.selectionStart, e = editor.selectionEnd;
    editor.setRangeText(before + editor.value.substring(s, e) + after, s, e, 'end');
    editor.focus(); renderPreview(); markUnsaved();
  }
  function insertLink() {
    const s = editor.selectionStart, e = editor.selectionEnd;
    const sel = editor.value.substring(s, e) || '링크 텍스트';
    editor.setRangeText(`[${sel}](URL)`, s, e, 'end');
    editor.focus(); renderPreview(); markUnsaved();
  }
  function insertTable() {
    const t = '\n| 제목1 | 제목2 | 제목3 |\n|-------|-------|-------|\n| 내용1 | 내용2 | 내용3 |\n| 내용4 | 내용5 | 내용6 |\n';
    const pos = editor.selectionEnd;
    editor.setRangeText(t, pos, pos, 'end');
    editor.focus(); renderPreview(); markUnsaved();
  }

  // File ops
  function openFile() { fileInput.click(); }
  fileInput.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      editor.value = ev.target.result;
      currentFilename = file.name;
      savedContent = editor.value;
      unsaved = false;
      filenameDisplay.textContent = currentFilename;
      filenameDisplay.classList.remove('unsaved');
      renderPreview(); updateStats();
      showToast(file.name + ' 열림');
    };
    reader.readAsText(file, 'UTF-8');
    fileInput.value = '';
  });

  function saveFile() {
    const blob = new Blob([editor.value], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = currentFilename; a.click();
    URL.revokeObjectURL(url);
    savedContent = editor.value;
    unsaved = false;
    filenameDisplay.classList.remove('unsaved');
    showToast(currentFilename + ' 저장됨');
  }

  function newDoc() {
    if (unsaved && editor.value.trim()) {
      if (!confirm('저장하지 않은 내용이 있습니다. 새 문서를 만들까요?')) return;
    }
    editor.value = '';
    currentFilename = '새 문서.md';
    savedContent = '';
    unsaved = false;
    filenameDisplay.textContent = currentFilename;
    filenameDisplay.classList.remove('unsaved');
    renderPreview(); updateStats();
    showToast('새 문서');
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.ctrlKey || e.metaKey) {
      if (e.key === 's') { e.preventDefault(); saveFile(); }
      if (e.key === 'o') { e.preventDefault(); openFile(); }
      if (e.key === 'b') { e.preventDefault(); wrap('**','**'); }
      if (e.key === 'i') { e.preventDefault(); wrap('*','*'); }
    }
    if (e.key === 'Tab' && document.activeElement === editor) {
      e.preventDefault();
      const s = editor.selectionStart;
      editor.setRangeText('  ', s, s, 'end');
    }
  });

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  // UI Scale
  let currentScale = parseInt(localStorage.getItem('md-scale') || '3');

  function applyScale(level) {
    currentScale = Math.max(1, Math.min(5, level));
    document.body.setAttribute('data-scale', currentScale);
    document.getElementById('scale-indicator').textContent = currentScale;
    document.getElementById('btn-scale-minus').disabled = currentScale <= 1;
    document.getElementById('btn-scale-plus').disabled = currentScale >= 5;
    localStorage.setItem('md-scale', currentScale);
  }

  function changeScale(delta) {
    applyScale(currentScale + delta);
  }

  // ── 모바일 편집/미리보기 전환 ──────────────────────────────────────
  let mobileView = localStorage.getItem('md-mobile-view') || 'editor';

  function applyMobileView(view) {
    mobileView = view;
    document.body.setAttribute('data-mobile-view', view);
    document.getElementById('mobile-toggle-label').textContent =
      view === 'editor' ? '미리보기' : '편집';
    localStorage.setItem('md-mobile-view', view);
  }

  function toggleMobileView() {
    applyMobileView(mobileView === 'editor' ? 'preview' : 'editor');
  }

  // Restore saved theme
  const savedTheme = localStorage.getItem('md-theme') || 'light';
  themeSelect.value = savedTheme;
  applyTheme(savedTheme);
  applyScale(currentScale);
  applyMobileView(mobileView);



  // PWA Install
  let deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('btn-install').style.display = '';
  });
  window.addEventListener('appinstalled', () => {
    deferredPrompt = null;
    document.getElementById('btn-install').style.display = 'none';
    showToast('앱이 설치됐어요!');
  });
  function installPWA() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(choice => {
      deferredPrompt = null;
      if (choice.outcome === 'accepted') showToast('설치 중...');
    });
  }

  // ── Resizer (drag to resize panes — desktop: horizontal, mobile: hidden via CSS) ──
  (function() {
    const resizer    = document.getElementById('resizer');
    const editorPane = document.getElementById('editor-pane');
    const main       = document.getElementById('main');
    let startX = 0, startW = 0;

    function isStacked() {
      // 모바일 레이아웃(세로 스택)에서는 #main의 flex-direction이 column
      return getComputedStyle(main).flexDirection === 'column';
    }

    resizer.addEventListener('mousedown', e => {
      if (isStacked()) return; // 모바일에선 리사이저 자체가 숨김 처리되지만 안전장치
      startX = e.clientX;
      startW = editorPane.offsetWidth;
      resizer.classList.add('dragging');
      document.body.classList.add('resizing');
      e.preventDefault();
    });

    document.addEventListener('mousemove', e => {
      if (!resizer.classList.contains('dragging')) return;
      const delta    = e.clientX - startX;
      const mainW    = main.offsetWidth;
      const minW     = 120;
      const maxW     = mainW - 120 - 5; // 5 = resizer width
      const newW     = Math.min(maxW, Math.max(minW, startW + delta));
      editorPane.style.width = newW + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (!resizer.classList.contains('dragging')) return;
      resizer.classList.remove('dragging');
      document.body.classList.remove('resizing');
      // Save ratio to localStorage
      const ratio = editorPane.offsetWidth / main.offsetWidth;
      localStorage.setItem('md-split', ratio.toFixed(4));
    });

    // Touch support (desktop pointer-capable tablets in landscape; hidden on mobile via CSS)
    resizer.addEventListener('touchstart', e => {
      if (isStacked()) return;
      startX = e.touches[0].clientX;
      startW = editorPane.offsetWidth;
      resizer.classList.add('dragging');
      document.body.classList.add('resizing');
    }, { passive: true });

    document.addEventListener('touchmove', e => {
      if (!resizer.classList.contains('dragging')) return;
      const delta = e.touches[0].clientX - startX;
      const mainW = main.offsetWidth;
      const newW  = Math.min(mainW - 125, Math.max(120, startW + delta));
      editorPane.style.width = newW + 'px';
    }, { passive: true });

    document.addEventListener('touchend', () => {
      if (!resizer.classList.contains('dragging')) return;
      resizer.classList.remove('dragging');
      document.body.classList.remove('resizing');
      const ratio = editorPane.offsetWidth / main.offsetWidth;
      localStorage.setItem('md-split', ratio.toFixed(4));
    });

    // Double-click → reset to 50:50
    resizer.addEventListener('dblclick', () => {
      if (isStacked()) return;
      editorPane.style.width = '50%';
      localStorage.setItem('md-split', '0.5');
    });

    // Restore saved ratio on load (데스크탑에서만 의미 있음; 모바일은 CSS가 flex:1 강제)
    const savedRatio = parseFloat(localStorage.getItem('md-split') || '0.5');
    editorPane.style.width = (savedRatio * 100) + '%';

    // 화면 크기 변경(회전 등) 시 모바일 전환 버튼 표시 상태 동기화
    window.addEventListener('resize', () => {
      if (isStacked()) {
        document.body.setAttribute('data-mobile-view', mobileView);
      } else {
        document.body.removeAttribute('data-mobile-view');
      }
    });
  })();

  renderPreview();
  updateStats();
</script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js')
        .then(r => console.log('SW registered:', r.scope))
        .catch(e => console.log('SW error:', e));
    });
  }
</script>
</body>
